version: '3.8'

services:
  # Backend API service
  medicaloptics-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8033:8033"
    volumes:
      - ./backend:/app
    depends_on:
      - medicaloptics-qdrant
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=medicaloptics-qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - medicaloptics-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://medical-optics.softdemonew.info/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scheduler service for regular reindexing
  medicaloptics-scheduler:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: python scheduler.py
    volumes:
      - ./backend:/app
    depends_on:
      - medicaloptics-qdrant
      - medicaloptics-backend
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=medicaloptics-qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - medicaloptics-net
    restart: unless-stopped

  # Qdrant vector database
  medicaloptics-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6033:6333"  # Map external 6033 to internal 6333
      - "6034:6334"  # Map external 6034 to internal 6334
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - medicaloptics-net
    restart: unless-stopped

  # Frontend service (production build with Nginx)
  medicaloptics-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3033:3033"
    depends_on:
      - medicaloptics-backend
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - medicaloptics-net
    restart: unless-stopped

  # Nginx reverse proxy (optional, alternative to built-in Nginx in frontend)
  # medicaloptics-nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - medicaloptics-backend
  #     - medicaloptics-frontend
  #   networks:
  #     - medicaloptics-net
  #   restart: unless-stopped

networks:
  medicaloptics-net:
    driver: bridge

volumes:
  qdrant-data:
    driver: local 