version: '3.8'

services:
  # Qdrant vector database (start first)
  mrnwebdesigns-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6043:6333"
      - "6044:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mrnwebdesigns-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API service (no volume conflicts)
  mrnwebdesigns-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8043:8043"
    depends_on:
      - mrnwebdesigns-qdrant
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=mrnwebdesigns-qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - mrnwebdesigns-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8043/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend service
  mrnwebdesigns-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3043:3043"
    depends_on:
      - mrnwebdesigns-backend
    environment:
      - REACT_APP_API_URL=http://localhost:8043/api
    networks:
      - mrnwebdesigns-net
    restart: unless-stopped

networks:
  mrnwebdesigns-net:
    driver: bridge

volumes:
  qdrant_data:
    driver: local 