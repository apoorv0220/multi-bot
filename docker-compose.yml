version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8013:8013"
    volumes:
      - ./backend:/app
    depends_on:
      - qdrant
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - migraine-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scheduler service for regular reindexing
  scheduler:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: python scheduler.py
    volumes:
      - ./backend:/app
    depends_on:
      - qdrant
      - backend
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - migraine-net
    restart: unless-stopped

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - migraine-net
    restart: unless-stopped

  # Frontend service (production build with Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3013:3013"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - migraine-net
    restart: unless-stopped

  # Nginx reverse proxy (optional, alternative to built-in Nginx in frontend)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - migraine-net
  #   restart: unless-stopped

networks:
  migraine-net:
    driver: bridge

volumes:
  qdrant-data:
    driver: local 