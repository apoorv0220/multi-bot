services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6043}:6333"
      - "${QDRANT_GRPC_PORT:-6044}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8043}:${API_PORT:-8043}"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/chatbot}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      ENVIRONMENT: ${ENVIRONMENT:-production}
      API_PORT: ${API_PORT:-8043}
      # Persist tenant avatars across image rebuilds (named volume)
      TENANT_ASSETS_DIR: /data/tenant-assets
    volumes:
      - tenant_assets:/data/tenant-assets
      # Country resolution: run `python3 backend/scripts/download_dbip_country_lite.py` then set GEOIP_DB_PATH in .env
      - ./data/geoip:/data/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${API_PORT:-8043}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:${BACKEND_PORT:-8043}}
    ports:
      - "${FRONTEND_PORT:-3043}:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:${BACKEND_PORT:-8043}}
      - WIDGET_BASE_URL=${WIDGET_BASE_URL:-}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-}

volumes:
  qdrant_data:
  postgres_data:
  tenant_assets: