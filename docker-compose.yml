version: '3.8'

services:
  # Backend API service
  houseoftiles-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8023:8023"
    volumes:
      - ./backend:/app
    depends_on:
      - houseoftiles-qdrant
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=houseoftiles-qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - houseoftiles-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://houseoftiles.softdemonew.info/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scheduler service for regular reindexing
  houseoftiles-scheduler:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: python scheduler.py
    volumes:
      - ./backend:/app
    depends_on:
      - houseoftiles-qdrant
      - houseoftiles-backend
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=houseoftiles-qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=production
    networks:
      - houseoftiles-net
    restart: unless-stopped

  # Qdrant vector database
  houseoftiles-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6023:6333"  # Map external 6023 to internal 6333
      - "6024:6334"  # Map external 6024 to internal 6334
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - houseoftiles-net
    restart: unless-stopped

  # Frontend service (production build with Nginx)
  houseoftiles-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3023:3023"
    depends_on:
      - houseoftiles-backend
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - houseoftiles-net
    restart: unless-stopped

  # Nginx reverse proxy (optional, alternative to built-in Nginx in frontend)
  # houseoftiles-nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - houseoftiles-backend
  #     - houseoftiles-frontend
  #   networks:
  #     - houseoftiles-net
  #   restart: unless-stopped

networks:
  houseoftiles-net:
    driver: bridge

volumes:
  qdrant-data:
    driver: local 